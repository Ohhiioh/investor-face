<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Investment Physiognomy</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #020617; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: #fbbf24; box-shadow: 0 0 15px #fbbf24; animation: scan 2s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            const [step, setStep] = useState('welcome'); // welcome, camera, loading, result
            const [image, setImage] = useState(null);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            // --- [!] ใส่ API Key ของคุณที่นี่ ---
            // ไปเอาได้ที่: https://aistudio.google.com/app/apikey
            const API_KEY = "AIzaSyBeALFO7mb_1jMtxj4vjCYAeUdEMNUJZsU"; 

            const tribeData = {
                PRESERVER: { title: "🛡️ The Preserver", textColor: "text-emerald-400", bg: "bg-emerald-500/10", border: "border-emerald-500/50" },
                FOLLOWER: { title: "🌟 The Follower", textColor: "text-amber-400", bg: "bg-amber-500/10", border: "border-amber-500/50" },
                ACCUMULATOR: { title: "🚀 The Accumulator", textColor: "text-rose-400", bg: "bg-rose-500/10", border: "border-rose-500/50" },
                INDEPENDENT: { title: "🔍 The Independent", textColor: "text-blue-400", bg: "bg-blue-500/10", border: "border-blue-500/50" }
            };

            const startCamera = async () => {
                try {
                    setError(null);
                    setStep('camera');
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) {
                    setError("กรุณาอนุญาตให้เข้าถึงกล้อง (หรือตรวจสอบว่าเปิดผ่าน HTTPS)");
                    setStep('welcome');
                }
            };

            const capture = () => {
                const ctx = canvasRef.current.getContext('2d');
                // กำหนดขนาดภาพ
                ctx.drawImage(videoRef.current, 0, 0, 400, 500);
                const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.8);
                setImage(dataUrl);
                
                // ปิดกล้องเพื่อประหยัดพลังงาน
                const stream = videoRef.current.srcObject;
                if (stream) stream.getTracks().forEach(t => t.stop());
                
                analyze(dataUrl);
            };

            const analyze = async (base64Data) => {
                if (!API_KEY || API_KEY.trim() === "") {
                    setError("ยังไม่ได้ใส่ API Key ในโค้ด (บรรทัดที่ 46)");
                    setStep('welcome');
                    return;
                }
                
                setStep('loading');
                setError(null);
                const base64Content = base64Data.split(',')[1];
                
                const prompt = `วิเคราะห์ใบหน้าตามหลักโหงวเฮ้งและเชื่อมโยงกับการลงทุน (Investment Style) 
                เลือก 1 ประเภทจาก: PRESERVER, FOLLOWER, ACCUMULATOR, INDEPENDENT
                ให้วิเคราะห์ลักษณะหน้าผาก ตา จมูก ปาก สั้นๆ
                ตอบเป็น JSON เท่านั้น: { "traits": "ลักษณะใบหน้าสั้นๆ", "category": "KEY", "explanation": "คำอธิบายเชิงโหงวเฮ้งและการลงทุนในภาษาไทย" }`;

                try {
                    // ใช้ gemini-2.5-flash-preview หรือ gemini-1.5-flash หากติดลิมิต
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Content } }] }]
                        })
                    });
                    
                    const result = await res.json();

                    if (!res.ok) {
                        const errorMsg = result.error?.message || "Unknown API Error";
                        throw new Error(`API Error: ${errorMsg}`);
                    }

                    const text = result.candidates[0].content.parts[0].text;
                    const cleanJson = text.replace(/```json/g, "").replace(/```/g, "").trim();
                    setAnalysis(JSON.parse(cleanJson));
                    setStep('result');
                } catch (err) {
                    console.error("Analysis Error:", err);
                    setError(`พบปัญหา: ${err.message}`);
                    setStep('welcome');
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 flex flex-col items-center justify-center">
                    <div className="w-full text-center mb-8">
                        <div className="w-16 h-16 bg-amber-500 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                            <i data-lucide="sparkles" className="text-slate-900"></i>
                        </div>
                        <h1 className="text-3xl font-black text-amber-500 italic">INVESTOR FACE</h1>
                        <p className="text-slate-400 text-xs mt-1 uppercase tracking-widest">AI Physiognomy Analysis</p>
                    </div>

                    <div className="w-full glass rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
                        {step === 'welcome' && (
                            <div className="text-center py-6">
                                <h2 className="text-xl font-bold mb-4">สแกนใบหน้าเศรษฐี</h2>
                                <p className="text-slate-400 text-sm mb-8 italic">"หน้าตาบอกวาสนา การลงทุนบอกอนาคต"</p>
                                <button onClick={startCamera} className="w-full bg-amber-500 text-slate-900 font-black py-4 rounded-2xl hover:scale-105 active:scale-95 transition">
                                    เริ่มวิเคราะห์วาสนา
                                </button>
                                {error && (
                                    <div className="mt-4 p-4 bg-red-500/20 border border-red-500/50 rounded-xl text-red-400 text-xs text-left overflow-auto max-h-32 font-mono">
                                        <div className="font-black mb-1 uppercase">Error Details:</div>
                                        {error}
                                    </div>
                                )}
                            </div>
                        )}

                        {step === 'camera' && (
                            <div className="relative animate-in fade-in duration-500">
                                <div className="rounded-3xl overflow-hidden border-2 border-slate-700 relative aspect-[3/4] bg-black">
                                    <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                                    <div className="scanner-line"></div>
                                    <div className="absolute inset-0 border-[30px] border-black/40 pointer-events-none"></div>
                                </div>
                                <canvas ref={canvasRef} width="400" height="500" className="hidden" />
                                <button onClick={capture} className="w-full mt-6 bg-white text-slate-900 font-black py-4 rounded-2xl active:scale-95 transition shadow-xl">
                                    บันทึกภาพเพื่ออ่านดวง
                                </button>
                                <button onClick={() => setStep('welcome')} className="w-full mt-2 text-slate-500 text-xs font-bold py-2">ยกเลิก</button>
                            </div>
                        )}

                        {step === 'loading' && (
                            <div className="text-center py-12 animate-in zoom-in-95">
                                <div className="w-16 h-16 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                                <h3 className="text-lg font-bold text-amber-500">กำลังอ่านเส้นวาสนา...</h3>
                                <p className="text-slate-500 text-xs mt-2">AI กำลังคำนวณโหงวเฮ้งกับพอร์ตที่คู่ควร</p>
                            </div>
                        )}

                        {step === 'result' && analysis && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-8 duration-700">
                                <div className="relative mx-auto w-40 h-40">
                                    <div className="w-full h-full rounded-full overflow-hidden border-4 border-amber-500 shadow-2xl relative z-10">
                                        <img src={image} className="w-full h-full object-cover" />
                                    </div>
                                    <div className="absolute -inset-2 bg-amber-500/20 rounded-full animate-pulse"></div>
                                </div>
                                
                                <div className={`p-6 rounded-3xl border-2 shadow-inner ${tribeData[analysis.category]?.border || 'border-slate-500'} ${tribeData[analysis.category]?.bg || 'bg-slate-500/10'}`}>
                                    <span className="text-[10px] font-black uppercase tracking-widest opacity-50">ผลการวิเคราะห์</span>
                                    <h3 className={`text-2xl font-black mb-2 ${tribeData[analysis.category]?.textColor || 'text-white'}`}>
                                        {tribeData[analysis.category]?.title || 'Unknown Style'}
                                    </h3>
                                    <div className="h-px bg-white/10 my-3"></div>
                                    <p className="text-[11px] text-slate-300 font-bold mb-3 italic">ลักษณะเด่น: {analysis.traits}</p>
                                    <p className="text-sm leading-relaxed text-slate-100">{analysis.explanation}</p>
                                </div>
                                
                                <button onClick={() => setStep('welcome')} className="w-full py-4 bg-slate-800 text-slate-400 font-black rounded-2xl hover:bg-slate-700 transition">
                                    วิเคราะห์คนถัดไป
                                </button>
                            </div>
                        )}
                    </div>
                    
                    <footer className="mt-8 text-[10px] text-slate-700 font-bold uppercase tracking-widest text-center flex flex-col gap-1">
                        <span>PHILLIP CAPITAL x AI VISION ENGINE</span>
                        <span className="opacity-50">สำหรับใช้งานภายในงานอีเวนต์เท่านั้น</span>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize Icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
