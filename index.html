<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Investor Face | PhillipCapital</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .glow-amber { box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: #fbbf24; box-shadow: 0 0 20px #fbbf24; animation: scan 2s linear infinite; z-index: 20; }
        .result-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            const [step, setStep] = useState('welcome'); 
            const [image, setImage] = useState(null);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            // --- [!] ใส่ API Key ของคุณที่นี่ ---
            const API_KEY = "AIzaSyCDq9iszI7ZOcdBfAkmcHBl873GdQBJhuM"; 

            // ข้อมูลจาก Master Playbook HTML ที่คุณส่งมา
            const playbookData = {
                PRESERVER: { 
                    title: "🛡️ Passive / Preserver", 
                    tag: "Guardian Type",
                    traits: "เน้นความปลอดภัย มั่นคง",
                    message: "มั่นคง ปลอดภัย เชื่อถือได้",
                    assets: "Fixed Income, กองทุนผสม Conservative",
                    color: "text-blue-400",
                    border: "border-blue-500/50",
                    bg: "bg-blue-500/10"
                },
                FOLLOWER: { 
                    title: "🌟 Celebrity / Follower", 
                    tag: "Trending Type",
                    traits: "ตามกระแส มนุษย์สัมพันธ์ดี",
                    message: "คนส่วนใหญ่กำลังลงทุนสิ่งนี้",
                    assets: "Thematic Fund, Trending Assets",
                    color: "text-amber-400",
                    border: "border-amber-500/50",
                    bg: "bg-amber-500/10"
                },
                ACCUMULATOR: { 
                    title: "🚀 Active / Accumulator", 
                    tag: "Adventurer Type",
                    traits: "กล้าตัดสินใจ มองหาโอกาส",
                    message: "โอกาสสร้างความมั่งคั่งที่เหนือกว่า",
                    assets: "Direct Stock, PE/VC, Crypto",
                    color: "text-rose-400",
                    border: "border-rose-500/50",
                    bg: "bg-rose-500/10"
                },
                INDEPENDENT: { 
                    title: "🔍 Individualist / Independent", 
                    tag: "Analytical Type",
                    traits: "วิเคราะห์เอง มีระบบคิด",
                    message: "ข้อมูลจริง โปร่งใส ไร้การตกแต่ง",
                    assets: "Model Portfolio, Research-based",
                    color: "text-teal-400",
                    border: "border-teal-500/50",
                    bg: "bg-teal-500/10"
                }
            };

            const startCamera = async () => {
                try {
                    setError(null);
                    setStep('camera');
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'user', width: { ideal: 1080 }, height: { ideal: 1350 } } 
                    });
                    setTimeout(() => {
                        if (videoRef.current) videoRef.current.srcObject = stream;
                    }, 100);
                } catch (err) {
                    setError("ไม่สามารถเข้าถึงกล้องได้: " + err.message);
                    setStep('welcome');
                }
            };

            const capture = () => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.drawImage(videoRef.current, 0, 0, 400, 500);
                const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.8);
                setImage(dataUrl);
                
                const stream = videoRef.current.srcObject;
                if (stream) stream.getTracks().forEach(t => t.stop());
                
                analyze(dataUrl);
            };

            const analyze = async (base64Data) => {
                if (!API_KEY) {
                    setError("ยังไม่ได้ใส่ API Key ในโค้ด (บรรทัด 46)");
                    setStep('welcome');
                    return;
                }
                
                setStep('loading');
                const base64Content = base64Data.split(',')[1];
                
                const prompt = `วิเคราะห์ใบหน้าตามหลักโหงวเฮ้งและจิตวิทยาการลงทุน (Psychographic) 
                เลือก 1 ประเภทจาก: PRESERVER, FOLLOWER, ACCUMULATOR, INDEPENDENT
                โดยวิเคราะห์จากหน้าผาก (ปัญญา), ตา (ความมุ่งมั่น), จมูก (วาสนาการเงิน), ปาก (การตัดสินใจ)
                ตอบเป็น JSON เท่านั้น: { "faceAnalysis": "คำอธิบายโหงวเฮ้งสั้นๆ", "category": "KEY", "confidence": "0-100" }`;

                // ระบบ Fallback: ลอง 2.5 ถ้าล้มเหลวให้ใช้ 1.5
                const models = ["gemini-2.5-flash-preview-09-2025", "gemini-1.5-flash"];
                let success = false;

                for (const model of models) {
                    if (success) break;
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Content } }] }]
                            })
                        });
                        
                        const result = await res.json();
                        if (!res.ok) throw new Error(result.error?.message || "API Error");

                        const text = result.candidates[0].content.parts[0].text;
                        const cleanJson = text.replace(/```json/g, "").replace(/```/g, "").trim();
                        setAnalysis(JSON.parse(cleanJson));
                        setStep('result');
                        success = true;
                    } catch (err) {
                        console.warn(`Model ${model} failed, trying next...`);
                        if (model === models[models.length - 1]) {
                            setError(`การวิเคราะห์ขัดข้อง: ${err.message}`);
                            setStep('welcome');
                        }
                    }
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 flex flex-col items-center">
                    {/* Header */}
                    <div className="w-full text-center mt-4 mb-8">
                        <div className="w-14 h-14 bg-amber-500 rounded-2xl mx-auto flex items-center justify-center shadow-xl mb-4 glow-amber">
                            <i data-lucide="sparkles" className="text-slate-900 w-8 h-8"></i>
                        </div>
                        <h1 className="text-3xl font-black text-amber-500 italic tracking-tighter">INVESTOR FACE</h1>
                        <p className="text-slate-500 text-[10px] uppercase tracking-[0.3em] font-bold">Phillip Capital x AI Vision</p>
                    </div>

                    {/* Main UI */}
                    <div className="w-full glass rounded-[3rem] p-8 shadow-2xl relative overflow-hidden min-h-[420px] flex flex-col">
                        
                        {step === 'welcome' && (
                            <div className="text-center flex-1 flex flex-col justify-center animate-in fade-in duration-700">
                                <h2 className="text-2xl font-bold mb-3">สแกนใบหน้าเศรษฐี</h2>
                                <p className="text-slate-400 text-sm mb-10 leading-relaxed italic">"วิเคราะห์เส้นวาสนาจากโครงหน้า<br/>เพื่อค้นหาพอร์ตการลงทุนที่คู่ควร"</p>
                                <button onClick={startCamera} className="w-full bg-amber-500 text-slate-950 font-black py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                                    เริ่มวิเคราะห์วาสนา
                                </button>
                                {error && (
                                    <div className="mt-6 p-4 bg-red-500/10 border border-red-500/30 rounded-2xl text-red-400 text-[10px] text-left font-mono">
                                        <div className="font-black mb-1">SYSTEM ERROR:</div>
                                        {error}
                                    </div>
                                )}
                            </div>
                        )}

                        {step === 'camera' && (
                            <div className="relative animate-in zoom-in-95 duration-500">
                                <div className="rounded-[2rem] overflow-hidden border-2 border-slate-700 relative aspect-[3/4] bg-black shadow-2xl">
                                    <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
                                    <div className="scanner-line"></div>
                                    <div className="absolute inset-0 border-[30px] border-black/40 pointer-events-none"></div>
                                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 w-3/4 h-24 border-2 border-dashed border-amber-500/50 rounded-full opacity-50"></div>
                                </div>
                                <canvas ref={canvasRef} width="400" height="500" className="hidden" />
                                <button onClick={capture} className="w-full mt-8 bg-white text-slate-900 font-black py-5 rounded-2xl shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3">
                                    <i data-lucide="camera" className="w-5 h-5"></i> บันทึกภาพดวงชะตา
                                </button>
                                <button onClick={() => setStep('welcome')} className="w-full mt-4 text-slate-500 text-xs font-bold uppercase tracking-widest">ยกเลิก</button>
                            </div>
                        )}

                        {step === 'loading' && (
                            <div className="flex-1 flex flex-col items-center justify-center py-12">
                                <div className="w-20 h-20 border-4 border-amber-500/20 border-t-amber-500 rounded-full animate-spin mb-8"></div>
                                <h3 className="text-xl font-bold text-amber-500 mb-2">กำลังอ่านเส้นวาสนา...</h3>
                                <p className="text-slate-500 text-xs animate-pulse">AI กำลังเปรียบเทียบลักษณะเด่นกับพอร์ตการลงทุน</p>
                            </div>
                        )}

                        {step === 'result' && analysis && (
                            <div className="w-full animate-in slide-in-from-bottom-8 duration-700 space-y-6">
                                <div className="relative mx-auto w-44 h-44">
                                    <div className="w-full h-full rounded-full overflow-hidden border-4 border-amber-500 shadow-2xl relative z-10">
                                        <img src={image} className="w-full h-full object-cover" />
                                    </div>
                                    <div className="absolute -inset-3 bg-amber-500/20 rounded-full animate-pulse"></div>
                                </div>

                                {playbookData[analysis.category] ? (
                                    <div className={`p-6 rounded-[2rem] border-2 ${playbookData[analysis.category].border} ${playbookData[analysis.category].bg} result-card`}>
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-[10px] font-black uppercase tracking-widest opacity-60">Result Analysis</span>
                                            <span className="text-[10px] font-bold px-2 py-0.5 bg-white/10 rounded-full">Score: {analysis.confidence}%</span>
                                        </div>
                                        <h3 className={`text-2xl font-black mb-1 ${playbookData[analysis.category].color}`}>
                                            {playbookData[analysis.category].title}
                                        </h3>
                                        <p className="text-[10px] font-bold text-slate-400 mb-4">{playbookData[analysis.category].tag}</p>
                                        
                                        <div className="space-y-4">
                                            <div className="p-3 bg-white/5 rounded-xl">
                                                <label className="text-[9px] font-black uppercase text-slate-500 block mb-1">การวิเคราะห์โหงวเฮ้ง</label>
                                                <p className="text-xs text-slate-200 leading-relaxed italic">{analysis.faceAnalysis}</p>
                                            </div>
                                            <div>
                                                <label className="text-[9px] font-black uppercase text-amber-500 block mb-1">Strategic Advice</label>
                                                <p className="text-sm font-bold text-white mb-3">"{playbookData[analysis.category].message}"</p>
                                                <div className="flex flex-wrap gap-2">
                                                    <span className="text-[9px] bg-white/10 px-2 py-1 rounded-md text-slate-300">Recommended Assets: {playbookData[analysis.category].assets}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="p-6 bg-red-500/20 rounded-2xl text-center">Data Mapping Error</div>
                                )}

                                <button onClick={() => setStep('welcome')} className="w-full py-4 bg-slate-800 text-slate-400 font-black rounded-2xl hover:bg-slate-700 transition-all">
                                    วิเคราะห์คนถัดไป
                                </button>
                            </div>
                        )}
                    </div>

                    <footer className="mt-10 text-center space-y-2 opacity-30">
                        <p className="text-[10px] font-bold uppercase tracking-[0.4em]">Phillip Securities Thailand</p>
                        <p className="text-[8px]">ข้อมูลนี้เป็นการวิเคราะห์เบื้องต้น ผู้ลงทุนควรทำความเข้าใจลักษณะสินค้า เงื่อนไขผลตอบแทนและความเสี่ยงก่อนตัดสินใจลงทุน</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
